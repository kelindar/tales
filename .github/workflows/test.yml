name: Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

env:
  GO111MODULE: "on"
  GOCOGNIT_MAX: "20"
  COVER_FAIL_UNDER: "75"

jobs:
  test:
    name: Test with Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: go mod download

      - name: Run unit tests with coverage
        run: |
          mkdir -p coverage
          go test -tags noasm -race -count=1 -covermode=atomic -coverprofile=coverage/go \
            $(go list ./... | grep -v -E '/cmd/(bench|example)$')

      - name: Check cognitive complexity
        run: |
          go install github.com/uudashr/gocognit/cmd/gocognit@v1.2.1
          echo "### Cognitive complexity (max ${GOCOGNIT_MAX})" >> "$GITHUB_STEP_SUMMARY"
          gocognit -ignore "_test|testdata|cmd|mock" -avg . ./internal | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          gocognit -ignore "_test|testdata|cmd|mock" -top 10 . ./internal | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          gocognit -ignore "_test|testdata|cmd|mock" -over "${GOCOGNIT_MAX}" . ./internal

      - name: Upload coverage to Coveralls
        uses: shogo82148/actions-goveralls@v1
        with:
          path-to-profile: coverage/go
        env:
          GITHUB_TOKEN: ${{ secrets.COVERALLS_TOKEN }}

      - name: Convert Go coverage to lcov
        run: |
          go install github.com/jandelgado/gcov2lcov@v1.1.1
          gcov2lcov -infile=coverage/go -outfile=coverage/go.lcov

      - name: Enforce new-code coverage
        if: github.event_name == 'pull_request'
        uses: Affanmir/diff-cover-action@v2
        with:
          coverage-files: coverage/go.lcov
          compare-branch: origin/${{ github.base_ref }}
          fail-under: ${{ env.COVER_FAIL_UNDER }}
